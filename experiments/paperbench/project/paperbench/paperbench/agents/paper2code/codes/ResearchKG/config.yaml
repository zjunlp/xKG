active_profile: basic-deepseek-v3

code: &code-repo-settings
  code_extensions: [".py", ".js", ".ts", ".java", ".cpp", ".c", ".h", ".hpp", ".go", ".rs", ".php", ".cs"]
  doc_extensions: [".md", ".txt", ".rst", ".json", ".yaml", ".yml"]
  embedder: 
    model_client: OpenAIClient
    batch_size: 500
    model_kwargs: 
      model: text-embedding-3-small
      dimensions: 256
      encoding_format: float
    text_splitter:
      chunk_size: 350
      chunk_overlap: 100
      split_by: word
  retriever:
    faiss:
      top_k: 10
    llm:
      top_files: 5
      top_complete_file: 1
  llm_check_code: false
  exec_check_code: false

retrieve: &kg-retrieve-settings
  embedding_model: /disk/disk_20T/luoyujie/ResearchKG/storage/model/all-MiniLM-L6-v2
  technique_similarity: 0.6
  paper_similarity: 0.6

common: &common-settings
  <<: *kg-retrieve-settings
  code: *code-repo-settings
  log_level: DEBUG
  raw_data_path: /disk/disk_20T/luoyujie/preparedness/project/paperbench/paperbench/agents/paper2code/codes/ResearchKG/storage/kg_all
  kg_path: /disk/disk_20T/luoyujie/preparedness/project/paperbench/paperbench/agents/paper2code/codes/ResearchKG/storage/kg_all
  max_prompt_code_bytes: 52100

basic-deepseek-v3:
  <<: *common-settings
  api_type: openai
  model: o4-mini-2025-04-16
  paper_model: o4-mini-2025-04-16
  code_model: o4-mini-2025-04-16


