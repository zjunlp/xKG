# Default profile selection
active_profile: basic-deepseek-v3

# Code-RAG processing parameters
code: &code-repo-settings
  code_extensions: [".py", ".js", ".ts", ".java", ".cpp", ".c", ".h", ".hpp", ".go", ".rs", ".php", ".cs"]
  doc_extensions: [".md", ".txt", ".rst", ".json", ".yaml", ".yml"]
  embedder: 
    model_client: OpenAIClient
    batch_size: 500
    model_kwargs: 
      model: text-embedding-3-small
      dimensions: 256
      encoding_format: float
    text_splitter:
      chunk_size: 350
      chunk_overlap: 100
      split_by: word
  retriever:
    faiss:
      top_k: 10
    llm:
      top_files: 5
      top_complete_file: 1
  llm_check_code: false
  exec_check_code: false
  exec_debug_num: 8

# Paper-RAG processing parameters
paper: &paper-settings
  rag: true
  embedder: 
    model_client: OpenAIClient
    batch_size: 500
    model_kwargs: 
      model: text-embedding-3-small
      dimensions: 256
      encoding_format: float
    text_splitter:
      chunk_size: 350
      chunk_overlap: 100
      split_by: word
  retriever:
    faiss:
      top_k: 5

# Knowledge graph retrieval parameters
retrieve: &kg-retrieve-settings
  embedding_model: all-MiniLM-L6-v2
  embedding_client: local
  # embedding_model: text-embedding-3-small
  # embedding_client: openai
  technique_similarity: 0.5 # Only retrieve techniques with similarity above this threshold
  paper_similarity: 0.5 # Only retrieve papers with similarity above this threshold

common: &common-settings
  <<: *kg-retrieve-settings
  code: *code-repo-settings
  paper: *paper-settings
  log_level: DEBUG
  raw_index_path: storage/raw/index
  raw_papers_path: storage/raw/paper
  raw_code_path: storage/raw/code
  kg_path: storage/kg
  process_path: storage/process
  save_process: true
  max_prompt_code_bytes: 52100
  
basic-deepseek-v3:
  <<: *common-settings
  api_type: openai
  model: deepseek-v3.2 # General-purpose model
  paper_model: o4-mini # Specialized model for technique extraction and reconstruction
  code_model: o4-mini # Specialized model for code rewriting and debugging

# Additional model configurations (customizable)
gpt-5-2025-08-07:
  <<: *common-settings
  api_type: openai
  model: gpt-5-2025-08-07

claude-sonnet-4-20250514:
  <<: *common-settings
  api_type: openai
  model: claude-sonnet-4-20250514

deepseek-r1:
  <<: *common-settings
  api_type: openai
  model: DMXAPI-DeepSeek-R1

gemini-2-5-pro:
  <<: *common-settings
  api_type: openai
  model: gemini-2.5-pro

o1:
  <<: *common-settings
  api_type: openai
  model: o1